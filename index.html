<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<style>
body {
  margin: 0;
  background: transparent;
  font-family: Arial, sans-serif;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  gap: 12px;

  width: 380px;
  padding: 12px 14px;

  background: rgba(20, 20, 20, 0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 16px;
  color: white;

  opacity: 0;
  transform: translateY(6px);
  transition: 0.4s ease;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

/* POP ANIMATION */
.card.pop {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.98); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* ALBUM ART */
#art {
  width: 64px;
  height: 64px;
  border-radius: 10px;
  object-fit: cover;
  background: #333;
}

/* TEXT */
.text {
  flex: 1;
  overflow: hidden;
}

.label {
  font-size: 11px;
  opacity: 0.7;
  margin-bottom: 4px;
}

.title {
  font-size: 15px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
}

.artist {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 2px;
}

/* LIVE VISUALIZER */
.livebar {
  margin-top: 8px;
  display: flex;
  gap: 3px;
  align-items: end;
  height: 10px;
}

.livebar span {
  width: 3px;
  height: 4px;
  background: linear-gradient(180deg, #7c5cff, #00d4ff);
  border-radius: 2px;
  animation: bounce 1s infinite ease-in-out;
}

.livebar span:nth-child(2) { animation-delay: 0.1s; }
.livebar span:nth-child(3) { animation-delay: 0.2s; }
.livebar span:nth-child(4) { animation-delay: 0.3s; }

@keyframes bounce {
  0%,100% { height: 4px; opacity: 0.4; }
  50% { height: 10px; opacity: 1; }
}
</style>
</head>

<body>

<div class="card" id="card">
  <img id="art" />

  <div class="text">
    <div class="label">NOW PLAYING</div>

    <div class="title" id="title">Waiting for music...</div>
    <div class="artist" id="artist"></div>

    <div class="livebar">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<script>
const API_KEY = "c164eddec12d53ff3dccf5e010da1617";
const USER = "grogwart";

let activeId = "";

async function update() {
  try {
    const url =
      `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${USER}&api_key=${API_KEY}&format=json&limit=1`;

    const res = await fetch(url);
    const data = await res.json();

    const track = data?.recenttracks?.track?.[0];
    if (!track) return;

    const isPlaying = track["@attr"]?.nowplaying === "true";

    if (!isPlaying) {
      document.getElementById("card").classList.remove("show");
      return;
    }

    const title = track.name || "Unknown track";
    const artist = track?.artist?.["#text"] || "Unknown artist";
    const id = title + artist;

    const card = document.getElementById("card");

    if (id !== activeId) {
      activeId = id;

      document.getElementById("title").textContent = title;
      document.getElementById("artist").textContent = artist;

      const img =
        track?.image?.[2]?.["#text"] ||
        track?.image?.[1]?.["#text"] ||
        track?.image?.[0]?.["#text"] ||
        "";

      document.getElementById("art").src = img;

      card.classList.add("show");
      card.classList.remove("pop");
      void card.offsetWidth;
      card.classList.add("pop");
    }

    card.classList.add("show");

  } catch (err) {
    console.error("Overlay error:", err);

    document.getElementById("title").textContent = "Connection error";
    document.getElementById("artist").textContent = "Check Last.fm setup";
  }
}

setInterval(update, 4000);
update();
</script>

</body>
</html>
